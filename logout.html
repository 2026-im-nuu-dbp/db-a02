<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>安全登出 - 圖文備忘錄系統</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f1f5f9;
        }
        .logout-card {
            text-align: center;
            max-width: 400px;
            padding: 3rem;
            animation: scaleIn 0.3s ease-out;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .check-icon {
            font-size: 4rem;
            color: #22c55e;
            margin-bottom: 1rem;
        }
        .countdown {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card logout-card">
    <div class="check-icon">🛡️</div>
    <h2 style="margin-bottom: 10px;">您已安全登出</h2>
    <p style="color: #475569;">感謝您使用圖文備忘錄系統，期待下次與您見面。</p>
    
    <div class="countdown">
        系統將在 <span id="timer">3</span> 秒後自動返回首頁...
    </div>
    
    <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" onclick="location.href='index.html'">
        立即返回登入頁
    </button>
</div>

<script>
    let seconds = 3;
    const timerEl = document.getElementById('timer');
    
    // 倒數計時邏輯
    const interval = setInterval(() => {
        seconds--;
        timerEl.innerText = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = 'index.html';
        }
    }, 1000);
</script>

</body>
</html>
